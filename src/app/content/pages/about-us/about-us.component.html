<div class="card">

  <div class="card-content collapse show">
    <div class="card-header bg-primary bg-darken-2 white text-center card-title-bold text-capitalize">About us </div>
    <div class="card-body">

      <div class="card-content collapse show">
          <div class="card-body card-dashboard table-responsive">

              <table class="table table-striped table-bordered dom-jQuery-events">
              <thead>
                  <tr>
                      <th>id</th>
                      <!-- <th>Section Banner image</th> -->
                      <th>Section title</th>
                      <!-- <th>Section image</th> -->
                      <th>Mission Title</th>
                      <th>Vision Title</th>
                      <!-- <th>Vision and mission image</th> -->

                      <th>&nbsp;</th>
                  </tr>
              </thead>
              <tbody>

                  <tr>
                      <td>1</td>
                      <!-- <td><img [src]="aboutUsImage+AboutUs?.about_banner_image" height="100px" alt=""></td> -->
                      <td>{{AboutUs?.en_about_section_title}}</td>
                      <!-- <td><img [src]="aboutUsImage+AboutUs?.about_section_image" height="100px" alt=""></td> -->
                      <td>{{AboutUs?.en_mission_title}}</td>
                      <td>{{AboutUs?.en_vision_title}}</td>
                      <!-- <td><img [src]="aboutUsImage+AboutUs?.mission_vision_image" height="100px" alt=""></td> -->

                      <td class="row justify-content-center no-gutters">
                          <a routerLink="/about-us/edit/{{AboutUs?.id}}" class="btn btn-round mr-1 btn-success"><i class="la la-edit"></i></a>
                      </td>
                  </tr>



              </tbody>

              </table>
              <section class="slider">
                <h4>All images</h4>

                <owl-carousel-o [options]="mainSlider">
                  <ng-container>
                    <ng-template carouselSlide>

                      <div class="item text-center">
                          <img  [src]="aboutUsImage+AboutUs?.about_banner_image" class="main_slider_img" alt="">
                      </div>
                    </ng-template>
                  </ng-container>
                  <ng-container>
                    <ng-template carouselSlide>

                      <div class="item text-center">
                        <img  [src]="aboutUsImage+AboutUs?.about_section_image" class="main_slider_img" alt="">
                      </div>
                    </ng-template>
                  </ng-container>
                  <ng-container>
                    <ng-template carouselSlide>

                      <div class="item text-center">
                        <img  [src]="aboutUsImage+AboutUs?.mission_vision_image" class="main_slider_img" alt="">
                      </div>
                    </ng-template>
                  </ng-container>

                </owl-carousel-o>
              </section>
          </div>

    </div>
  </div>
</div>
