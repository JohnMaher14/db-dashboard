<div class="card">

  <div class="card-content collapse show">
    <div class="card-header bg-primary bg-darken-2 white text-center card-title-bold text-capitalize">Home </div>
    <div class="card-body">

      <div class="card-content collapse show">
          <div class="card-body card-dashboard table-responsive">

              <table class="table table-striped table-bordered dom-jQuery-events">
              <thead>
                  <tr>
                      <th>id</th>
                      <th>Home title</th>
                      <th>First title</th>
                      <th>Seond title</th>
                      <th>Third title</th>


                      <th>&nbsp;</th>
                  </tr>
              </thead>
              <tbody>

                  <tr>
                      <td>1</td>
                      <td>{{home?.en_about_home_title}}</td>
                      <td>{{home?.en_first_icon_title}}</td>
                      <td>{{home?.en_second_icon_title}}</td>
                      <td>{{home?.en_third_icon_title}}</td>

                      <td class="row justify-content-center no-gutters">
                          <a routerLink="/home-page/edit/{{home?.id}}" class="btn btn-round mr-1 btn-success"><i class="la la-edit"></i></a>
                      </td>
                  </tr>



              </tbody>

              </table>
              <section class="slider">
                <h4>All images</h4>

                <owl-carousel-o [options]="mainSlider">
                  <ng-container>
                    <ng-template carouselSlide>

                      <div class="item text-center">
                          <img  [src]="imageUrl+home?.first_icon" class="main_slider_img" alt="">
                      </div>
                    </ng-template>
                  </ng-container>
                  <ng-container>
                    <ng-template carouselSlide>

                      <div class="item text-center">
                        <img  [src]="imageUrl+home?.second_icon" class="main_slider_img" alt="">
                      </div>
                    </ng-template>
                  </ng-container>
                  <ng-container>
                    <ng-template carouselSlide>

                      <div class="item text-center">
                        <img  [src]="imageUrl+home?.third_icon" class="main_slider_img" alt="">
                      </div>
                    </ng-template>
                  </ng-container>
                  <ng-container>
                    <ng-template carouselSlide>

                      <div class="item text-center">
                        <img  [src]="imageUrl+home?.fourth_icon" class="main_slider_img" alt="">
                      </div>
                    </ng-template>
                  </ng-container>

                </owl-carousel-o>
              </section>
          </div>

    </div>
  </div>
</div>
